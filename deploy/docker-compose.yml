version: "3.9"

services:

  app:
    build: .
    container_name: statuspulse-app
    restart: unless-stopped

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: statuspulse
      DB_USER: statuspulse
      DB_PASSWORD: statuspulse

      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: statuspulse
      POSTGRES_USER: statuspulse
      POSTGRES_PASSWORD: statuspulse

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  caddy:
    image: caddy:latest
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - app

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped

    ports:
      - "3001:3001"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
