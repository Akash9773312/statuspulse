# Local development — app + PostgreSQL + Redis (assessment Task 1)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statuspulse-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - statuspulse
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:15-alpine
    container_name: statuspulse-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-statuspulse}
      POSTGRES_USER: ${POSTGRES_USER:-statuspulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - statuspulse
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-statuspulse} -d ${POSTGRES_DB:-statuspulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: statuspulse-redis
    restart: unless-stopped
    networks:
      - statuspulse
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  statuspulse:
    driver: bridge
    name: statuspulse-net

volumes:
  postgres_data:
    name: statuspulse-postgres-data
