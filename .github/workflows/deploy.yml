name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image names (GHCR requires lowercase)
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          GIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          echo "IMAGE_BASE=ghcr.io/${REPO_LC}" >> "$GITHUB_ENV"
          echo "SHA_TAG=ghcr.io/${REPO_LC}:${GIT_SHA}" >> "$GITHUB_ENV"
          echo "LATEST_TAG=ghcr.io/${REPO_LC}:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "GIT_SHA=${GIT_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t "$SHA_TAG" -t "$LATEST_TAG" .
          docker push "$SHA_TAG"
          docker push "$LATEST_TAG"
          echo "Pushed $SHA_TAG and $LATEST_TAG"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ env.LATEST_TAG }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_IMAGE,DOMAIN_NAME,GHCR_TOKEN,GHCR_USER
          script_stop: true
          script: |
            set -euxo pipefail
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            cd /opt/statuspulse
            export APP_IMAGE DOMAIN_NAME
            chmod +x deploy.sh
            sudo -E ./deploy.sh

      - name: Post-deployment health check (on server)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -fsS -H "Host: ${{ secrets.DOMAIN_NAME }}" http://127.0.0.1/health | head -c 500
            echo ""
            echo "Deploy health check OK"

      - name: Notify on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `✅ **StatusPulse deploy succeeded**\n- Image: \`${{ env.LATEST_TAG }}\`\n- URL: https://${{ secrets.DOMAIN_NAME }}/health`;
            console.log(body);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('❌ StatusPulse deploy failed — expand the Deploy to server via SSH step above.');
